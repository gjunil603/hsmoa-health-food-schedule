services:
  - type: web
    name: hsmoa-health-food-schedule
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SYNC_DELAY_MS
        value: "45000"
      - key: SYNC_SECRET
        sync: false
